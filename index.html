<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LEVEL UP! - Panel de Jugador</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root {
            --bg-dark: #09021a;       
            --panel-bg: #0d0426;      
            --neon-cyan: #00ffff;     
            --neon-pink: #ff007f;     
            --neon-yellow: #fffb00;   
            --neon-green: #39ff14;
            --text-light: #ffffff;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: var(--bg-dark); font-family: 'Press Start 2P', monospace; color: var(--text-light); text-align: center; padding: 12px; font-size: 9px; }
        .container { width: 100%; max-width: 340px; margin: 0 auto; background: var(--panel-bg); border: 3px solid var(--neon-cyan); padding: 14px; box-shadow: 0px 0px 20px rgba(0, 255, 255, 0.4); }
        .brand-logo { max-width: 50%; height: auto; margin: 0 auto 14px auto; display: block; filter: drop-shadow(0px 0px 8px var(--neon-pink)); }
        .avatar-container { display: flex; align-items: center; background: rgba(0, 0, 0, 0.4); border: 2px solid var(--neon-cyan); padding: 8px; margin-bottom: 12px; }
        .avatar-frame { width: 75px; height: 75px; border: 2px solid var(--neon-pink); background-color: #000; margin-right: 10px; }
        .avatar-frame img { width: 100%; height: 100%; object-fit: cover; }
        .gamertag { color: var(--neon-yellow); font-size: 13px; margin-bottom: 4px; }
        .stats-grid { border: 2px solid var(--neon-yellow); background: rgba(0, 0, 0, 0.7); padding: 10px; margin-bottom: 14px; text-align: left; }
        .stat-item { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .grid-slots-3x3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 14px; }
        .slot { background: #050112; border: 2px solid #25104a; aspect-ratio: 1 / 1; display: flex; align-items: center; justify-content: center; position: relative; border-radius: 4px; }
        .slot img { width: 90%; height: 90%; object-fit: contain; opacity: 0.15; filter: grayscale(100%); }
        .slot.active { border-color: var(--neon-yellow); box-shadow: 0px 0px 10px var(--neon-yellow); }
        .slot.active img { opacity: 1; filter: grayscale(0%); }
        .slot-name { font-size: 6px; color: #8e7cc3; margin-top: 5px; text-transform: uppercase; }
        .slot.active + .slot-name { color: #ffffff; }
        .system-msg { margin-top: 50px; font-size: 10px; color: var(--neon-pink); }
    </style>
</head>
<body>

    <div class="container" id="game-card" style="display: none;">
        <img id="game-logo" class="brand-logo" src="logo.png" alt="LOGO">
        
        <div class="avatar-container">
            <div class="avatar-frame"><img id="avatar" src="" alt="Avatar"></div>
            <div class="player-header-info">
                <div class="gamertag" id="gamertag">JUGADOR</div>
                <div class="player-id" id="player-id-val">ID: #00</div>
            </div>
        </div>

        <div class="stats-grid">
            <div class="stat-item"><span>SCORE XP:</span><span id="xp-points">00000</span></div>
            <div class="stat-item"><span>VIDAS HP:</span><div id="lives-display"></div></div>
        </div>

        <div class="section-title">ITEMS DE ESTACIÓN</div>
        <div class="grid-slots-3x3">
            <div class="slot-wrapper"><div class="slot" id="slot-pocion"><img src="pocion.png" onerror="this.style.display='none'"></div><div class="slot-name">Poción</div></div>
            <div class="slot-wrapper"><div class="slot" id="slot-tiempo"><img src="tiempo.png" onerror="this.style.display='none'"></div><div class="slot-name">Tiempo</div></div>
            <div class="slot-wrapper"><div class="slot" id="slot-proteccion"><img src="proteccion.png" onerror="this.style.display='none'"></div><div class="slot-name">Protección</div></div>
            <div class="slot-wrapper"><div class="slot" id="slot-ayuda"><img src="ayuda.png" onerror="this.style.display='none'"></div><div class="slot-name">Ayuda</div></div>
        </div>

        <div class="section-title">STICKERS DE PREMIO</div>
        <div class="grid-slots-3x3">
            <div class="slot-wrapper"><div class="slot" id="stk-1"><img src="premio1.png" onerror="this.style.display='none'"></div><div class="slot-name">Grafía</div></div>
            <div class="slot-wrapper"><div class="slot" id="stk-2"><img src="premio2.png" onerror="this.style.display='none'"></div><div class="slot-name">Matriz</div></div>
            <div class="slot-wrapper"><div class="slot" id="stk-3"><img src="premio3.png" onerror="this.style.display='none'"></div><div class="slot-name">Simetría</div></div>
            <div class="slot-wrapper"><div class="slot" id="stk-4"><img src="premio4.png" onerror="this.style.display='none'"></div><div class="slot-name">Ritmo</div></div>
            <div class="slot-wrapper"><div class="slot" id="stk-5"><img src="premio5.png" onerror="this.style.display='none'"></div><div class="slot-name">Color</div></div>
            <div class="slot-wrapper"><div class="slot" id="stk-6"><img src="premio6.png" onerror="this.style.display='none'"></div><div class="slot-name">Prisma</div></div>
        </div>
    </div>

    <div id="loading-msg" class="system-msg">CONECTANDO...</div>

    <script>
        const EXCEL_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vT039Y2nAQCxDsSaD4bp_7Up1GkLGWmJ9bQdYRH5qZvLw1Uf-eZFoV07kNN5ztpssrX0YoQaQRs-YqS/pub?output=xlsx';
        const playerId = new URLSearchParams(window.location.search).get('id');

        fetch(EXCEL_URL).then(res => res.arrayBuffer()).then(buffer => {
            const data = XLSX.utils.sheet_to_json(XLSX.read(buffer).Sheets[0]);
            const p = data.find(r => String(r['ID']).toLowerCase().includes(String(playerId).toLowerCase()));
            
            if(!p) return document.getElementById('loading-msg').innerText = "ERROR: JUGADOR NO ENCONTRADO";
            
            document.getElementById('loading-msg').style.display = 'none';
            document.getElementById('game-card').style.display = 'block';
            document.getElementById('gamertag').innerText = (p['Gamer Tag'] || 'JUGADOR').toUpperCase();
            document.getElementById('xp-points').innerText = p['Puntaje Total'] || '00000';
            document.getElementById('avatar').src = p['Avatar URL'] || 'https://via.placeholder.com/150';
            
            const inv = String(p['Inventario Ítems'] || '').toLowerCase();
            const stk = String(p['Stickers Premio'] || '').toLowerCase();

            if(inv.includes('pocion')) document.getElementById('slot-pocion').classList.add('active');
            if(inv.includes('tiempo')) document.getElementById('slot-tiempo').classList.add('active');
            if(inv.includes('proteccion')) document.getElementById('slot-proteccion').classList.add('active');
            if(inv.includes('ayuda')) document.getElementById('slot-ayuda').classList.add('active');

            if(stk.includes('grafia')) document.getElementById('stk-1').classList.add('active');
            if(stk.includes('matriz')) document.getElementById('stk-2').classList.add('active');
            if(stk.includes('simetria')) document.getElementById('stk-3').classList.add('active');
            if(stk.includes('ritmo')) document.getElementById('stk-4').classList.add('active');
            if(stk.includes('color')) document.getElementById('stk-5').classList.add('active');
            if(stk.includes('prisma')) document.getElementById('stk-6').classList.add('active');
        });
    </script>
</body>
</html>
