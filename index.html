<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>LEVEL UP - Perfil</title>
    <style>
        body { background: #12121c; color: white; font-family: sans-serif; text-align: center; padding: 20px; }
        .container { max-width: 500px; margin: auto; border: 4px solid #4e4e7d; padding: 20px; background: #1a1a2e; }
        .grid-assets { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-top: 10px; min-height: 50px; }
        .grid-assets img { width: 50px; height: 50px; image-rendering: pixelated; border: 1px solid #4e4e7d; background: #000; }
    </style>
</head>
<body>

<div class="container">
    <h1>Level Up!</h1>
    <div id="status">Cargando perfil...</div>
    <div id="profile" style="display:none;">
        <h2 id="name"></h2>
        <p>Puntos: <span id="score"></span></p>
        <p>Mochila:</p>
        <div id="mochila-grid" class="grid-assets"></div>
        <p>Stickers:</p>
        <div id="stickers-grid" class="grid-assets"></div>
    </div>
</div>

<script>
    // 1. TU ENLACE CSV (Asegúrate de que termina en output=csv)
    const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vT039Y2nAQCxDsSaD4bp_7Up1GkLGWmJ9bQdYRH5qZvLw1Uf-eZFoV07kNN5ztpssrX0YoQaQRs-YqS/pub?output=csv"; 
    
    // 2. RUTA DE TUS IMÁGENES
    const ASSETS_URL = "https://raw.githubusercontent.com/sinergiacreativave-ctrl/LEVELUPSRL/main/assets/";

    // 3. LISTA DE TUS IMÁGENES (Para que el código sepa buscarlas)
    const misImagenes = [
        "1 Moneda.png", "2 Pocion.png", "3 Tiempo extra.png", 
        "4 Proteccion de vida.png", "5 Ayuda.png", 
        "1 Bronce.png", "2 Plata.png", "3 Oro.png"
    ];

    function renderAssets(containerId, dataString) {
        const container = document.getElementById(containerId);
        container.innerHTML = '';
        if (!dataString) return;
        
        const items = dataString.split(',');
        items.forEach(item => {
            const nombreLimpio = item.trim();
            // Buscamos si el nombre existe en nuestra lista
            const imgEncontrada = misImagenes.find(img => img.includes(nombreLimpio));
            
            if (imgEncontrada) {
                const img = document.createElement('img');
                img.src = ASSETS_URL + imgEncontrada;
                img.title = imgEncontrada;
                container.appendChild(img);
            }
        });
    }

    async function init() {
        const params = new URLSearchParams(window.location.search);
        const myId = params.get('id');
        
        try {
            const res = await fetch(CSV_URL);
            const text = await res.text();
            const rows = text.split('\n').map(r => r.split(','));
            const headers = rows[0].map(h => h.trim().toUpperCase());
            
            const idxId = headers.indexOf('ID');
            const idxTag = headers.indexOf('GAMER TAG');
            const idxScore = headers.indexOf('PUNTAJE TOTAL');
            const idxMochila = headers.indexOf('INVENTARIO ÍTEMS');
            const idxStickers = headers.indexOf('STICKERS PREMIO');

            for(let i = 1; i < rows.length; i++) {
                if(rows[i][idxId] && rows[i][idxId].replace('#','').trim() === myId) {
                    document.getElementById('name').textContent = rows[i][idxTag];
                    document.getElementById('score').textContent = rows[i][idxScore];
                    
                    renderAssets('mochila-grid', rows[i][idxMochila]);
                    renderAssets('stickers-grid', rows[i][idxStickers]);
                    
                    document.getElementById('profile').style.display = 'block';
                    document.getElementById('status').style.display = 'none';
                    return;
                }
            }
            document.getElementById('status').textContent = "Jugador no encontrado.";
        } catch(e) {
            document.getElementById('status').textContent = "Error de conexión: " + e.message;
        }
    }
    init();
</script>
</body>
</html>
