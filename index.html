<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>LEVEL UP! - Perfil de Jugador</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; background-color: #050505; color: #fff; font-family: 'Press Start 2P', monospace; }
        
        /* Contenedor Principal (Tu perfil completo) */
        #main-ui { padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .stats-card { border: 4px solid #fffb00; padding: 20px; width: 90%; max-width: 400px; margin-bottom: 20px; }
        .avatar { width: 120px; border: 4px solid #ff00ff; margin-bottom: 10px; }
        
        /* Overlay de Victoria (Oculto por defecto) */
        #victory-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); display: none; /* Oculto inicialmente */
            flex-direction: column; justify-content: center; align-items: center; z-index: 100;
        }
        .victory-box { border: 4px solid #00ff00; padding: 30px; text-align: center; background: #111; }
        .neon-btn { padding: 20px; background: transparent; border: 3px solid #00ffff; color: #00ffff; cursor: pointer; margin-top: 20px; font-family: inherit; }
    </style>
</head>
<body>

    <div id="main-ui">
        <div class="stats-card">
            <img id="avatar-img" class="avatar" src="">
            <h2 id="gamer-name">CARGANDO...</h2>
            <p>ID: <span id="gamer-id"></span></p>
            <p>XP: <span id="xp-val"></span></p>
            <p>Energía: <span id="energy-val"></span></p>
            <p>Vidas: <span id="lives-val"></span></p>
            <p>Stickers: <span id="sticker-count">0</span>/6</p>
        </div>
    </div>

    <div id="victory-overlay">
        <div class="victory-box">
            <h1>¡FELICITACIONES!</h1>
            <p>¡HAS COMPLETADO LOS 6 RETOS!</p>
            <button id="victory-btn" class="neon-btn">RECLAMAR VICTORIA</button>
        </div>
    </div>

    <script>
        const EXCEL_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vT039Y2nAQCxDsSaD4bp_7Up1GkLGWmJ9bQdYRH5qZvLw1Uf-eZFoV07kNN5ztpssrX0YoQaQRs-YqS/pub?output=xlsx';
        const AUDIO_URL = 'https://actions.google.com/sounds/v1/video_games/retro_arcade_level_up.ogg';
        
        const audio = new Audio(AUDIO_URL);
        const urlParams = new URLSearchParams(window.location.search);
        const playerId = urlParams.get('id');

        window.onload = () => {
            if(!playerId) return;
            fetch(EXCEL_URL)
                .then(res => res.arrayBuffer())
                .then(buffer => {
                    const wb = XLSX.read(buffer, {type: 'array'});
                    const ws = wb.Sheets[wb.SheetNames[0]];
                    const data = XLSX.utils.sheet_to_json(ws);
                    
                    const player = data.find(p => String(p['ID']).toLowerCase() == playerId.toLowerCase());
                    
                    if(player) {
                        // Llenar datos básicos
                        document.getElementById('gamer-name').innerText = player['Gamer Tag'] || "JUGADOR";
                        document.getElementById('gamer-id').innerText = playerId;
                        document.getElementById('avatar-img').src = player['Avatar URL'] || '';
                        document.getElementById('xp-val').innerText = player['XP (Puntaje Total)'] || "0";
                        document.getElementById('energy-val').innerText = player['Energia'] || "0/60";
                        document.getElementById('lives-val').innerText = player['Salud HP'] || "0";
                        
                        // Contar stickers
                        const stickerTexto = player['Stickers Premio'] || "";
                        const count = stickerTexto.toString().split(',').filter(i => i.trim() !== "").length;
                        document.getElementById('sticker-count').innerText = count;

                        // Si tiene 6, mostramos el overlay de victoria
                        if(count >= 6) {
                            document.getElementById('victory-overlay').style.display = 'flex';
                        }
                    }
                });
        };

        // Al hacer clic en el botón de victoria, desbloqueamos audio
        document.getElementById('victory-btn').addEventListener('click', () => {
            audio.play();
            alert("¡Nivel 2 Desbloqueado!");
        });
    </script>
</body>
</html>
