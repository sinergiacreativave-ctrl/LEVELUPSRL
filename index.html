<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>LEVEL UP - Perfil</title>
    <style>
        body { background: #12121c; color: white; font-family: sans-serif; text-align: center; padding: 20px; }
        .container { max-width: 500px; margin: auto; border: 4px solid #4e4e7d; padding: 20px; background: #1a1a2e; }
        .avatar { width: 120px; height: 120px; border-radius: 50%; border: 4px solid #4e4e7d; margin-bottom: 10px; }
        .grid-assets { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-top: 10px; min-height: 50px; }
        .grid-assets img { width: 50px; height: 50px; border: 1px solid #4e4e7d; background: #000; }
    </style>
</head>
<body>

<div class="container">
    <h1>Level Up!</h1>
    <div id="loader">Cargando perfil...</div>
    <div id="profile" style="display:none;">
        <img id="avatar" class="avatar" src="" alt="Avatar">
        <h2 id="name"></h2>
        <p>Puntos: <span id="score"></span></p>
        <p>Mochila:</p>
        <div id="mochila-grid" class="grid-assets"></div>
        <p>Stickers:</p>
        <div id="stickers-grid" class="grid-assets"></div>
    </div>
</div>

<script>
    // Tu enlace de Google Sheets publicado como CSV
    const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vT039Y2nAQCxDsSaD4bp_7Up1GkLGWmJ9bQdYRH5qZvLw1Uf-eZFoV07kNN5ztpssrX0YoQaQRs-YqS/pub?output=csv";
    
    // Usamos esta proxy para evitar el bloqueo del navegador (CORS)
    const PROXY = "https://api.allorigins.win/get?url=" + encodeURIComponent(CSV_URL);

    async function init() {
        const params = new URLSearchParams(window.location.search);
        const targetId = params.get('id')?.replace('#', '').trim();
        
        try {
            const response = await fetch(PROXY);
            const json = await response.json();
            const rows = json.contents.split('\n').map(r => r.split(','));

            let encontrado = false;
            for(let i = 1; i < rows.length; i++) {
                if (rows[i][1]?.trim() === targetId) {
                    // Columna A (0): Avatar, Columna C (2): Nombre, Columna L (11): Puntos
                    document.getElementById('avatar').src = rows[i][0].trim();
                    document.getElementById('name').textContent = rows[i][2];
                    document.getElementById('score').textContent = rows[i][11];
                    
                    // Columna J (9): Items, Columna K (10): Stickers
                    renderItems('mochila-grid', rows[i][9]);
                    renderItems('stickers-grid', rows[i][10]);
                    
                    document.getElementById('profile').style.display = 'block';
                    document.getElementById('loader').style.display = 'none';
                    encontrado = true;
                    break;
                }
            }
            if(!encontrado) document.getElementById('loader').textContent = "Jugador no encontrado.";
        } catch(e) { 
            console.error(e);
            document.getElementById('loader').textContent = "Error de conexión. Intenta de nuevo."; 
        }
    }

    function renderItems(containerId, data) {
        const div = document.getElementById(containerId);
        div.innerHTML = "";
        if (!data) return;
        
        // Separamos por coma si hay varios elementos
        data.split(',').forEach(ruta => {
            const urlLimpia = ruta.trim();
            if(urlLimpia !== "") {
                const img = document.createElement('img');
                img.src = urlLimpia; // Se usa la ruta exacta: assets/items/... o link directo
                img.onerror = () => { img.style.display = 'none'; };
                div.appendChild(img);
            }
        });
    }
    init();
</script>
</body>
</html>
