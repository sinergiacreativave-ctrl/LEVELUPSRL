<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>LEVEL UP! - Sistema Final</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; background-color: #050505; color: #fff; font-family: 'Press Start 2P', monospace; text-align: center; }
        .screen { height: 100vh; display: none; flex-direction: column; justify-content: center; align-items: center; }
        .card { border: 4px solid #fffb00; padding: 30px; width: 85%; max-width: 450px; background: rgba(0,0,0,0.85); box-shadow: 0 0 20px #fffb00; }
        .avatar { width: 140px; height: 140px; border: 5px solid #00ffff; box-shadow: 0 0 15px #00ffff; margin-bottom: 20px; object-fit: cover; }
        .neon-btn { padding: 20px; background: transparent; border: 3px solid #ff00ff; color: #ff00ff; cursor: pointer; box-shadow: 0 0 15px #ff00ff; font-family: inherit; }
    </style>
</head>
<body>

    <!-- PANTALLA 1: JUEGO NORMAL -->
    <div id="game-screen" class="screen" style="display: flex;">
        <div class="card">
            <h1 style="color:#00ffff; font-size:1.2em;">ESTADO ACTUAL</h1>
            <p>ID: <span id="display-id-game"></span></p>
            <p>Inventario: <span id="inv-count">0</span>/6</p>
        </div>
    </div>

    <!-- PANTALLA 2: VICTORIA -->
    <div id="victory-screen" class="screen">
        <div class="card">
            <h1>¡FELICITACIONES!</h1>
            <img id="avatar-img" class="avatar" src="">
            <p id="congrats-text" style="color: #00ff00;"></p>
            <button id="victory-btn" class="neon-btn">PRESIONA AQUÍ PARA CELEBRAR</button>
        </div>
    </div>

    <script>
        const EXCEL_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vT039Y2nAQCxDsSaD4bp_7Up1GkLGWmJ9bQdYRH5qZvLw1Uf-eZFoV07kNN5ztpssrX0YoQaQRs-YqS/pub?output=xlsx';
        const AUDIO_URL = 'https://actions.google.com/sounds/v1/video_games/retro_arcade_level_up.ogg';
        
        const audio = new Audio(AUDIO_URL);
        const urlParams = new URLSearchParams(window.location.search);
        const playerId = urlParams.get('id');

        window.onload = () => {
            if(!playerId) return;
            fetch(EXCEL_URL)
                .then(res => res.arrayBuffer())
                .then(buffer => {
                    const wb = XLSX.read(buffer, {type: 'array'});
                    const ws = wb.Sheets[wb.SheetNames[0]];
                    const data = XLSX.utils.sheet_to_json(ws);
                    
                    // Buscamos coincidencia exacta con el encabezado "ID"
                    const player = data.find(p => String(p['ID']).toLowerCase() == playerId.toLowerCase());
                    
                    if(player) {
                        const invTexto = player['Inventario Items'] || "";
                        const items = invTexto.split(',').filter(i => i.trim() !== "");
                        const count = items.length;

                        if(count >= 6) {
                            document.getElementById('game-screen').style.display = 'none';
                            document.getElementById('victory-screen').style.display = 'flex';
                            // Usamos el encabezado exacto "Avatar URL"
                            document.getElementById('avatar-img').src = player['Avatar URL'] || '';
                            document.getElementById('congrats-text').innerText = "¡SUBISTE AL NIVEL 2!";
                        } else {
                            document.getElementById('display-id-game').innerText = playerId;
                            document.getElementById('inv-count').innerText = count;
                        }
                    }
                });
        };

        document.getElementById('victory-btn').addEventListener('click', () => {
            audio.play();
            alert("¡Nivel superado!");
        });
    </script>
</body>
</html>
