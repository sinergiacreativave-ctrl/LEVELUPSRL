<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LEVEL UP! - Desafío Final</title>
    <!-- Fuente tipo arcade -->
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <!-- Librería para leer el Excel -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { margin: 0; background-color: #050505; font-family: 'Press Start 2P', monospace; color: #fff; height: 100vh; display: flex; justify-content: center; align-items: center; text-align: center; overflow: hidden; }
        .screen { display: flex; flex-direction: column; justify-content: center; align-items: center; width: 100%; height: 100%; }
        
        /* Estilos generales */
        .logo { width: 80%; max-width: 300px; margin-bottom: 40px; filter: drop-shadow(0 0 10px #00ffff); }
        .neon-btn { padding: 20px 40px; background: transparent; border: 3px solid #ff00ff; color: #ff00ff; font-family: inherit; cursor: pointer; box-shadow: 0 0 15px #ff00ff; animation: blink 1s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }
        
        /* Pantalla Victoria */
        .victory-card { border: 4px solid #fffb00; padding: 20px; background: rgba(0,0,0,0.8); width: 80%; max-width: 400px; }
        .avatar { width: 120px; height: 120px; border: 4px solid #00ffff; margin-bottom: 15px; }
        h1 { color: #fffb00; font-size: 1.5em; margin-bottom: 20px; }
    </style>
</head>
<body>

    <!-- PANTALLA 1: INICIO -->
    <div id="start-screen" class="screen">
        <img src="https://i.ibb.co/ZzWpn2rM/logo.png" alt="Logo" class="logo">
        <button id="start-btn" class="neon-btn">PRESIONA AQUÍ</button>
    </div>

    <!-- PANTALLA 2: VICTORIA -->
    <div id="victory-screen" class="screen" style="display: none;">
        <div class="victory-card">
            <h1>¡FELICITACIONES!</h1>
            <img id="avatar-img" src="" alt="Avatar" class="avatar">
            <p id="player-name" style="color: #00ffff; margin: 10px 0;"></p>
            <p id="player-id" style="font-size: 12px;"></p>
            <p style="color: #00ff00; margin-top: 20px;">¡SUBISTE AL NIVEL 2!</p>
        </div>
    </div>

    <script>
        // --- ENLACES CONFIGURADOS AUTOMÁTICAMENTE ---
        const EXCEL_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vT039Y2nAQCxDsSaD4bp_7Up1GkLGWmJ9bQdYRH5qZvLw1Uf-eZFoV07kNN5ztpssrX0YoQaQRs-YqS/pub?output=xlsx'; 
        const AUDIO_URL = 'https://actions.google.com/sounds/v1/video_games/retro_arcade_level_up.ogg'; 
        // --------------------------------------------

        const audio = new Audio(AUDIO_URL);
        const urlParams = new URLSearchParams(window.location.search);
        const playerId = urlParams.get('id');

        window.onload = () => {
            if(!playerId) return;
            fetch(EXCEL_URL)
                .then(res => res.arrayBuffer())
                .then(buffer => {
                    const wb = XLSX.read(buffer, {type: 'array'});
                    const ws = wb.Sheets[wb.SheetNames[0]];
                    const data = XLSX.utils.sheet_to_json(ws);
                    // Buscamos el jugador por su ID en la columna "ID"
                    const player = data.find(p => String(p['ID']).toLowerCase() == playerId.toLowerCase());
                    
                    if(player) {
                        document.getElementById('player-name').innerText = player['Gamer Tag'] || "JUGADOR";
                        document.getElementById('player-id').innerText = "ID: " + playerId;
                        document.getElementById('avatar-img').src = player['Avatar URL'] || 'https://via.placeholder.com/120';
                    }
                });
        };

        document.getElementById('start-btn').addEventListener('click', () => {
            audio.play(); // Se desbloquea el audio al hacer clic
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('victory-screen').style.display = 'flex';
        });
    </script>
</body>
</html>
