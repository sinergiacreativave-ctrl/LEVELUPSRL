<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LEVEL UP - Perfil de Jugador</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #12121c;
            --panel-color: #1a1a2e;
            --border-color: #4e4e7d;
            --text-color: #ffffff;
            --accent-color: #00ffcc;
            --alert-color: #ff4a4a;
        }

        body {
            font-family: 'Press Start 2P', monospace;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-size: 12px;
            line-height: 1.6;
        }

        .container {
            width: 100%;
            max-width: 500px;
            background: var(--panel-color);
            border: 4px solid var(--border-color);
            padding: 20px;
            box-shadow: 0px 0px 15px rgba(0, 255, 204, 0.2);
            text-align: center;
        }

        h1 {
            font-size: 18px;
            color: var(--accent-color);
            margin-bottom: 20px;
            text-transform: uppercase;
            text-shadow: 2px 2px #000;
        }

        .player-card {
            border: 2px dashed var(--border-color);
            padding: 15px;
            margin-bottom: 20px;
            background: rgba(0,0,0,0.2);
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            margin: 10px 0;
            border-bottom: 2px solid rgba(78, 78, 125, 0.3);
            padding-bottom: 5px;
        }

        .label { color: #8a8ab3; }
        .val { color: var(--text-color); }
        .score { color: #ffcc00; }
        .penalty { color: var(--alert-color); }

        .section-title {
            font-size: 10px;
            color: var(--accent-color);
            text-align: left;
            margin-top: 20px;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .grid-assets {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            background: rgba(0,0,0,0.3);
            border: 2px solid var(--border-color);
            padding: 10px;
            min-height: 60px;
            justify-content: center;
            align-items: center;
        }

        .grid-assets img {
            width: 45px;
            height: 45px;
            object-fit: contain;
            image-rendering: pixelated;
            filter: drop-shadow(2px 2px 0px #000);
        }

        .error-msg {
            color: var(--alert-color);
            font-size: 10px;
            margin-top: 20px;
        }

        .loading {
            color: var(--accent-color);
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Level Up!</h1>
    
    <div id="loading" class="loading">Cargando datos del servidor...</div>
    <div id="error" class="error-msg" style="display: none;"></div>

    <div id="profile" style="display: none;">
        <div class="player-card">
            <div class="info-row">
                <span class="label">ID:</span>
                <span class="val" id="player-id">-</span>
            </div>
            <div class="info-row">
                <span class="label">Gamer Tag:</span>
                <span class="val" id="player-tag" style="color: #00ffcc;">-</span>
            </div>
            <div class="info-row">
                <span class="label">Grado:</span>
                <span class="val" id="player-grade">-</span>
            </div>
            <div class="info-row">
                <span class="label">Puntos:</span>
                <span class="val score" id="player-score">0</span>
            </div>
            <div class="info-row">
                <span class="label">Faltas:</span>
                <span class="val penalty" id="player-penalties">0</span>
            </div>
        </div>

        <div class="section-title">🎒 Mi Mochila (Ítems)</div>
        <div id="mochila-grid" class="grid-assets"></div>

        <div class="section-title">🏅 Stickers de Premio</div>
        <div id="premios-grid" class="grid-assets"></div>
    </div>
</div>

<script>
    // Configuración de las URLs de tu proyecto
    // ¡IMPORTANTE! Reemplaza este enlace por tu ID de Google Sheets publicado como CSV
    const SHEET_CSV_URL = "TU_REEMPLAZO_AQUÍ";
    
    // Ruta base de tus imágenes en GitHub (Donde están tus pociones, monedas y stickers)
    const IMAGE_BASE_URL = "https://raw.githubusercontent.com/TU_USUARIO/TU_REPOSITORIO/main/assets/";

    // Función para obtener el ID de la URL (?id=1)
    function getPlayerIdFromURL() {
        const params = new URLSearchParams(window.location.search);
        let id = params.get('id');
        if (!id) return null;
        return id.replace('#', '').trim(); // Limpia el '#' por si acaso
    }

    // Función para procesar y renderizar las imágenes en un contenedor
    function renderAssets(containerId, dataString) {
        const container = document.getElementById(containerId);
        container.innerHTML = ''; // Limpiar contenedor
        
        if (!dataString || dataString.trim() === "" || dataString === "0") {
            container.innerHTML = '<span style="color:#4e4e7d; font-size:9px;">Vacío</span>';
            return;
        }

        // Separa los elementos por coma
        const items = dataString.split(',');
        items.forEach(item => {
            const itemName = item.trim();
            if (itemName !== "") {
                const img = document.createElement('img');
                // Si guardaste el nombre con la extensión, la usa directo. Si no, le añade .png
                img.src = itemName.endsWith('.png') ? IMAGE_BASE_URL + itemName : IMAGE_BASE_URL + itemName + '.png';
                img.alt = itemName;
                img.title = itemName;
                img.onerror = () => { img.style.display = 'none'; }; // Oculta si la imagen no existe en GitHub
                container.appendChild(img);
            }
        });
    }

    async function loadPlayerData() {
        const targetId = getPlayerIdFromURL();
        if (!targetId) {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('error').textContent = "ERROR: No se especificó ningún ID de jugador en el código QR.";
            document.getElementById('error').style.display = 'block';
            return;
        }

        try {
            const response = await fetch(SHEET_CSV_URL);
            const data = await response.text();
            
            // Separar el CSV por filas
            const rows = data.split('\n').map(row => row.split(','));
            
            // Asumiendo el orden clásico de tus columnas de la hoja principal:
            // Columna B (Índice 1): ID del alumno (#1, #2...)
            // Columna C (Índice 2): Gamer Tag
            // Columna D (Índice 3): Grado
            // Columna I (Índice 8): Inventario Ítems (Mochila)
            // Columna J (Índice 9): Stickers Premio
            // Columna L (Índice 11): Puntaje Total
            // Columna M (Índice 12): Penalizaciones

            let playerFound = false;

            for (let i = 1; i < rows.length; i++) {
                const row = rows[i];
                if (!row[1]) continue; // Fila vacía

                // Limpiar el ID de la fila para comparar de forma justa
                const rowId = row[1].replace('#', '').trim();

                if (rowId === targetId) {
                    playerFound = true;
                    
                    // Asignar los textos básicos
                    document.getElementById('player-id').textContent = `#${rowId}`;
                    document.getElementById('player-tag').textContent = row[2] || "Sin Tag";
                    document.getElementById('player-grade').textContent = row[3] || "-";
                    document.getElementById('player-score').textContent = row[11] || "0";
                    document.getElementById('player-penalties').textContent = row[12] || "0";

                    // Renderizar las imágenes de la mochila y los premios
                    renderAssets('mochila-grid', row[8]); // Columna I
                    renderAssets('premios-grid', row[9]);  // Columna J

                    break;
                }
            }

            document.getElementById('loading').style.display = 'none';
            if (playerFound) {
                document.getElementById('profile').style.display = 'block';
            } else {
                document.getElementById('error').textContent = `JUGADOR NO ENCONTRADO: El ID #${targetId} no está registrado.`;
                document.getElementById('error').style.display = 'block';
            }

        } catch (err) {
            console.error(err);
            document.getElementById('loading').style.display = 'none';
            document.getElementById('error').textContent = "ERROR: No se pudo conectar con la base de datos de Google Sheets.";
            document.getElementById('error').style.display = 'block';
        }
    }

    // Ejecutar al cargar la página
    window.onload = loadPlayerData;
</script>

</body>
</html>
