<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LEVEL UP! - Panel de Jugador</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root {
            --bg-dark: #12042b;       
            --panel-bg: #240c4d;      
            --neon-cyan: #00ffff;     
            --neon-pink: #ff007f;     
            --neon-yellow: #fffb00;   
            --text-light: #ffffff;
            --battery-color: #00ff00; 
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg-dark);
            background-image: linear-gradient(rgba(18, 4, 43, 0.3) 50%, rgba(0, 0, 0, 0.4) 50%), linear-gradient(90deg, rgba(255, 0, 127, 0.05), rgba(0, 255, 255, 0.05));
            background-size: 100% 4px, 40px 40px; 
            color: var(--text-light);
            font-family: 'Press Start 2P', monospace;
            text-align: center;
            padding: 10px 6px;
            font-size: 9px;
            line-height: 1.5;
            overflow-x: hidden;
        }

        .container {
            width: 100%;
            max-width: 340px;
            margin: 0 auto;
            background: var(--panel-bg);
            border: 4px solid var(--neon-cyan);
            padding: 12px;
            box-shadow: 0px 0px 15px var(--neon-cyan), inset 0px 0px 10px rgba(0,255,255,0.3);
            position: relative;
        }

        .brand-logo { max-width: 55%; height: auto; margin: 0 auto 12px auto; display: block; filter: drop-shadow(0px 0px 6px var(--neon-pink)); }
        .player-profile-block { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-bottom: 12px; text-align: left; background: rgba(0, 0, 0, 0.2); padding: 6px; border: 2px dashed #441880; }
        .player-meta-info { flex: 1; display: flex; flex-direction: column; gap: 5px; }
        .gamertag { color: var(--neon-yellow); font-size: 11px; text-shadow: 2px 2px 0px #000; letter-spacing: 0.5px; word-wrap: break-word; }
        .player-id-grade { font-size: 7px; color: #a393eb; }
        .character-desc { font-size: 6.5px; color: #bfa6ff; line-height: 1.4; word-wrap: break-word; }
        .avatar-frame { width: 85px; height: 85px; border: 4px solid var(--neon-pink); background-color: #000; box-shadow: 0px 0px 8px var(--neon-pink); position: relative; flex-shrink: 0; }
        .avatar-frame img { width: 100%; height: 100%; object-fit: cover; }
        .avatar-frame.inactive img { opacity: 0.20; }
        .avatar-frame.inactive::after { content: "INACTIVO"; position: absolute; top: 40%; left: 0; width: 100%; background: rgba(255, 0, 127, 0.9); color: #fff; font-size: 7px; text-align: center; padding: 3px 0; box-shadow: 0 0 5px #fff; }

        .stats-grid { border: 3px solid var(--neon-yellow); background: rgba(0, 0, 0, 0.6); padding: 8px; margin-bottom: 14px; text-align: left; }
        .stat-item { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; border-bottom: 2px dashed #441880; padding-bottom: 6px; }
        .stat-label { color: var(--neon-cyan); }
        .xp-counter { color: var(--neon-yellow); font-size: 10px; }
        .lives-container { display: flex; align-items: center; gap: 4px; }
        .live-icon { width: 14px; height: 14px; object-fit: contain; }

        /* BATERÍA NEÓN (MODIFICADO) */
        .battery-wrapper { display: flex; align-items: center; gap: 4px; }
        .battery-container { width: 100px; height: 14px; background: rgba(0,0,0,0.5); position: relative; border-radius: 2px; overflow: hidden; border: none; }
        .battery-cells { height: 100%; background: var(--battery-color); box-shadow: 0px 0px 10px var(--battery-color), 0px 0px 20px var(--battery-color); filter: drop-shadow(0 0 3px var(--battery-color)); width: 0%; transition: width 0.4s ease; }
        
        .section-title { color: var(--neon-pink); font-size: 8px; margin: 14px 0 8px 0; text-align: left; text-transform: uppercase; }
        .grid-slots-3x3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 12px; width: 100%; }
        .slot { background: #110226; border: 2px solid #441880; aspect-ratio: 1 / 1; display: flex; align-items: center; justify-content: center; padding: 6px; position: relative; }
        .slot.active { border-color: var(--neon-cyan); box-shadow: 0px 0px 8px var(--neon-cyan); }
        .slot img { max-width: 100%; max-height: 100%; object-fit: contain; display: none; }
        .slot.active img { display: block; }
        .slot-locked-x { font-size: 14px; color: rgba(255, 0, 127, 0.3); font-weight: bold; }
        .slot.active .slot-locked-x { display: none; }
        .item-count-badge { position: absolute; bottom: 2px; right: 2px; background: #000; border: 1px solid var(--neon-yellow); color: var(--neon-yellow); font-size: 6px; padding: 1px 3px; display: none; }
        .penalty-text { font-size: 8px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 130px; }
        .system-msg { margin-top: 100px; font-size: 10px; color: var(--neon-pink); text-shadow: 2px 2px 0px #000; padding: 15px; }

        #levelup-screen { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background-color: #0b021a; z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; box-shadow: inset 0 0 100px #ff007f; animation: flashBg 1.5s infinite alternate; }
        @keyframes flashBg { 0% { box-shadow: inset 0 0 40px #ff007f; } 100% { box-shadow: inset 0 0 80px #00ffff; } }
        .lu-title { color: var(--neon-yellow); font-size: 24px; text-shadow: 4px 4px 0px #ff007f, -2px -2px 0px #00ffff; margin-bottom: 25px; animation: bounce 0.6s infinite alternate; }
        @keyframes bounce { 0% { transform: translateY(0) scale(1); } 100% { transform: translateY(-10px) scale(1.05); } }
        .lu-banner { border: 4px dashed #fff; padding: 15px; background: #000; font-size: 11px; color: #00ff00; line-height: 1.8; box-shadow: 0 0 15px #00ff00; }
        .lu-sparkles { font-size: 25px; margin: 15px 0; color: var(--neon-cyan); }
    </style>
</head>
<body>

    <div class="container" id="game-card" style="display: none;">
        <img id="game-logo" class="brand-logo" src="" alt="LOGO">
        
        <div class="player-profile-block">
            <div class="player-meta-info">
                <div id="gamertag" class="gamertag">JUGADOR</div>
                <div class="player-id-grade">ID: <span id="player-id-val">000</span> | NIVEL: <span id="player-grade-val">1</span></div>
                <div id="character-desc" class="character-desc">Cargando datos...</div>
            </div>
            <div class="avatar-frame" id="avatar-container">
                <img id="avatar" src="" alt="Avatar">
            </div>
        </div>

        <div class="stats-grid">
            <div class="stat-item">
                <span class="stat-label">SCORE XP:</span>
                <span id="xp-points" class="xp-counter">0</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">ENERGÍA:</span>
                <div class="battery-wrapper">
                    <div class="battery-container">
                        <div id="battery-bar" class="battery-cells"></div>
                    </div>
                    <span id="battery-text-val" class="battery-text">0/60</span>
                </div>
            </div>
            <div class="stat-item">
                <span class="stat-label">VIDAS HP:</span>
                <div id="lives-display" class="lives-container"></div>
            </div>
            <div class="stat-item">
                <span class="stat-label">ALERTA:</span>
                <span id="penalty-status" class="penalty-text">NINGUNA</span>
            </div>
        </div>

        <div class="section-title">ITEMS</div>
        <div class="grid-slots-3x3">
            <div class="slot" id="slot-tiempo" title="Tiempo Extra"><span class="slot-locked-x">X</span><img id="img-tiempo" src="" alt="Tiempo"><div id="badge-tiempo" class="item-count-badge">x1</div></div>
            <div class="slot" id="slot-pocion" title="Poción de Vida"><span class="slot-locked-x">X</span><img id="img-pocion" src="" alt="Poción"><div id="badge-pocion" class="item-count-badge">x1</div></div>
            <div class="slot" id="slot-proteccion" title="Protección"><span class="slot-locked-x">X</span><img id="img-proteccion" src="" alt="Protección"><div id="badge-proteccion" class="item-count-badge">x1</div></div>
            <div class="slot" id="slot-ayuda" title="Ayuda"><span class="slot-locked-x">X</span><img id="img-ayuda" src="" alt="Ayuda"><div id="badge-ayuda" class="item-count-badge">x1</div></div>
            <div class="slot"><span class="slot-locked-x">X</span></div>
            <div class="slot"><span class="slot-locked-x">X</span></div>
        </div>

        <div class="section-title">STICKERS</div>
        <div class="grid-slots-3x3">
            <div class="slot" id="stk-grafia"><span class="slot-locked-x">X</span><img id="img-stk-grafia" src="" alt="Grafía"></div>
            <div class="slot" id="stk-matriz"><span class="slot-locked-x">X</span><img id="img-stk-matriz" src="" alt="Matriz"></div>
            <div class="slot" id="stk-biosfera"><span class="slot-locked-x">X</span><img id="img-stk-biosfera" src="" alt="Biósfera"></div>
            <div class="slot" id="stk-cronicas"><span class="slot-locked-x">X</span><img id="img-stk-cronicas" src="" alt="Crónicas"></div>
            <div class="slot" id="stk-turbo"><span class="slot-locked-x">X</span><img id="img-stk-turbo" src="" alt="Turbo"></div>
            <div class="slot" id="stk-prisma"><span class="slot-locked-x">X</span><img id="img-stk-prisma" src="" alt="Prisma"></div>
        </div>
    </div>

    <div id="levelup-screen" style="display: none;">
        <div class="lu-sparkles">✨ 👾 ✨</div>
        <h1 class="lu-title">LEVEL UP!</h1>
        <div class="lu-banner">¡COMPLETASTE LOS 6 RETOS!</div>
    </div>

    <div id="loading-msg" class="system-msg">CONECTANDO AL SERVIDOR...</div>
    <div id="error-msg" class="system-msg" style="display: none;">ERROR: JUEGO NO ENCONTRADO</div>

    <script>
        // CONFIGURACIÓN AUDIOS
        const AUDIO_GO = new Audio('https://actions.google.com/sounds/v1/video_games/game_over.ogg');
        const AUDIO_WIN = new Audio('https://actions.google.com/sounds/v1/video_games/retro_arcade_level_up.ogg');

        const EXCEL_URL = 'TU_URL_AQUI'; 
        // ... (resto de tus constantes de iconos y elementos siguen igual)
        const ICONO_VIDA = 'https://i.ibb.co/s9p431JP/vida.png';

        // Lógica de carga del script (Integra aquí tu lógica existente)
        fetch(EXCEL_URL).then(res => res.arrayBuffer()).then(buffer => {
            const data = XLSX.utils.sheet_to_json(XLSX.read(buffer).Sheets[Object.keys(XLSX.read(buffer).Sheets)[0]]);
            const playerId = new URLSearchParams(window.location.search).get('id');
            const player = data.find(r => String(r['ID']).replace('#','') === String(playerId).replace('#',''));

            if(!player) return;

            // 1. HP (Columna I)
            let hp = parseInt(player['Salud HP']);
            const livesDisplay = document.getElementById('lives-display');
            livesDisplay.innerHTML = '';
            for(let i=0; i<Math.min(hp, 6); i++) {
                const img = document.createElement('img'); img.src = ICONO_VIDA; img.className = 'live-icon';
                livesDisplay.appendChild(img);
            }

            // 2. Energía (Columna P)
            let en = parseInt(player['Energía (Fórmula)']);
            document.getElementById('battery-bar').style.width = (en/60)*100 + '%';
            document.getElementById('battery-text-val').innerText = en + '/60';

            // 3. Audio y Victoria
            if(hp <= 0) AUDIO_GO.play();
            
            let st = String(player['Stickers Premio'] || '').toLowerCase();
            if(st.split(',').length >= 6) {
                document.getElementById('levelup-screen').style.display = 'flex';
                AUDIO_WIN.play();
            }

            document.getElementById('game-card').style.display = 'block';
            document.getElementById('loading-msg').style.display = 'none';
        });
    </script>
</body>
</html>
