<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>LEVEL UP - Perfil</title>
    <style>
        body { background: #12121c; color: white; font-family: sans-serif; text-align: center; padding: 20px; }
        .container { max-width: 500px; margin: auto; border: 4px solid #4e4e7d; padding: 20px; background: #1a1a2e; }
        .grid-assets { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-top: 10px; }
        .grid-assets img { width: 50px; height: 50px; image-rendering: pixelated; border: 1px solid #4e4e7d; }
        #debug { color: #ffcc00; font-size: 10px; margin-top: 20px; text-align: left; }
    </style>
</head>
<body>

<div class="container">
    <h1>Level Up!</h1>
    <div id="status">Cargando...</div>
    <div id="profile" style="display:none;">
        <h2 id="name"></h2>
        <p>Puntos: <span id="score"></span></p>
        <p>Mochila:</p>
        <div id="mochila-grid" class="grid-assets"></div>
    </div>
    <div id="debug"></div>
</div>

<script>
    // 1. PEGA AQUÍ TU ENLACE CSV (asegúrate que termine en output=csv)
    const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vT039Y2nAQCxDsSaD4bp_7Up1GkLGWmJ9bQdYRH5qZvLw1Uf-eZFoV07kNN5ztpssrX0YoQaQRs-YqS/pub?output=csv";
    // 2. LA RUTA A TUS IMÁGENES
    const ASSETS_URL = "https://raw.githubusercontent.com/sinergiacreativave-ctrl/LEVELUPSRL/main/assets/";

    function renderAssets(containerId, dataString) {
        const container = document.getElementById(containerId);
        container.innerHTML = '';
        if (!dataString) return;
        
        const items = dataString.split(',');
        items.forEach(item => {
            const name = item.trim();
            if (name === "") return;
            
            const img = document.createElement('img');
            // Asegura que termine en .png
            const fileName = name.endsWith('.png') ? name : name + ".png";
            img.src = ASSETS_URL + fileName;
            img.onerror = () => { img.style.display = 'none'; console.warn("No se encontró: " + fileName); };
            container.appendChild(img);
        });
    }

    async function init() {
        const params = new URLSearchParams(window.location.search);
        const myId = params.get('id');
        
        try {
            const res = await fetch(CSV_URL);
            const text = await res.text();
            const rows = text.split('\n').map(r => r.split(','));
            const headers = rows[0].map(h => h.trim().toUpperCase());
            
            const idxId = headers.indexOf('ID');
            const idxTag = headers.indexOf('GAMER TAG');
            const idxScore = headers.indexOf('PUNTAJE TOTAL');
            const idxMochila = headers.indexOf('INVENTARIO ÍTEMS');

            for(let i = 1; i < rows.length; i++) {
                if(rows[i][idxId] && rows[i][idxId].replace('#','').trim() === myId) {
                    document.getElementById('name').textContent = rows[i][idxTag];
                    document.getElementById('score').textContent = rows[i][idxScore];
                    renderAssets('mochila-grid', rows[i][idxMochila]);
                    document.getElementById('profile').style.display = 'block';
                    document.getElementById('status').style.display = 'none';
                    return;
                }
            }
            document.getElementById('status').textContent = "Jugador no encontrado.";
        } catch(e) {
            document.getElementById('debug').textContent = "Error: " + e.message;
        }
    }
    init();
</script>
</body>
</html>
