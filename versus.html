<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LEVEL UP! - Arena Versus</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #0d0814;
            background-image: radial-gradient(circle, #1a0f2e 10%, #0d0814 90%);
            color: #fff;
            font-family: 'Press Start 2P', monospace;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            padding-bottom: 40px;
        }

        /* PANEL DE CONTROL SUPERIOR */
        .admin-panel {
            background: rgba(20, 12, 36, 0.95);
            border-bottom: 4px solid #3d2466;
            width: 100%;
            padding: 15px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            z-index: 100;
            box-shadow: 0 5px 20px rgba(0,0,0,0.5);
        }

        .control-group {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 10px;
            color: #00ffff;
        }

        .admin-panel select {
            background: #0d0814;
            border: 2px solid #00ffff;
            color: #fff;
            font-family: 'Press Start 2P', monospace;
            padding: 5px 10px;
            font-size: 10px;
            cursor: pointer;
            outline: none;
        }

        .arena-stats {
            font-size: 10px;
            color: #ff007f;
            display: flex;
            gap: 15px;
        }

        #btn-shuffle {
            background: #ffcc00;
            border: 3px solid #b38f00;
            color: #0d0814;
            font-family: 'Press Start 2P', monospace;
            padding: 10px 20px;
            font-size: 12px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 4px 0 #b38f00;
            transition: all 0.1s ease;
        }

        #btn-shuffle:active {
            transform: translateY(4px);
            box-shadow: none;
        }

        /* LOGO PRINCIPAL */
        .game-logo-container {
            margin: 20px 0;
            text-align: center;
        }

        .game-logo {
            max-width: 180px;
            filter: drop-shadow(0 0 10px rgba(255, 0, 127, 0.5));
        }

        /* CONTENEDOR DE LA ARENA */
        #battle-arena {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 95%;
            max-width: 1100px;
            margin-top: 10px;
            gap: 10px;
        }

        .arena-side {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 15px;
            min-height: 350px;
            justify-content: center;
        }

        /* EJE CENTRAL VS */
        #center-axis {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 80px;
        }

        .axis-line {
            width: 8px;
            background: linear-gradient(to bottom, #ff007f, #00ffff);
            flex: 1;
            box-shadow: 0 0 10px #ff007f, 0 0 10px #00ffff;
        }

        .vs-box {
            background: #140c24;
            border: 4px solid #fff;
            padding: 15px 5px;
            transform: rotate(-5deg);
            box-shadow: 4px 4px 0 #ff007f;
            margin: 20px 0;
        }

        .vs-text {
            font-size: 22px;
            font-weight: bold;
            color: #fff;
            text-shadow: 2px 2px 0 #ff007f, -2px -2px 0 #00ffff;
            animation: pulse 1.5s infinite;
        }

        /* DISEÑO DE LAS TARJETAS MINIMALISTAS */
        .player-card {
            background: #1c1230;
            border: 4px solid #ff007f;
            border-radius: 8px;
            padding: 15px;
            box-shadow: inset 0 0 15px rgba(255, 0, 127, 0.3), 0 0 15px rgba(0,0,0,0.6);
            display: flex;
            flex-direction: column;
            gap: 12px;
            transition: all 0.3s ease;
        }

        #side-right .player-card {
            border-color: #00ffff;
            box-shadow: inset 0 0 15px rgba(0, 255, 255, 0.3), 0 0 15px rgba(0,0,0,0.6);
        }

        .player-header {
            border-bottom: 2px dashed #3d2466;
            padding-bottom: 8px;
            font-size: 10px;
            color: #a29bb0;
            text-align: center;
            display: flex;
            justify-content: space-between;
        }

        .xp-text {
            color: #00ff66;
            font-size: 12px;
            margin-top: 5px;
        }

        .player-body {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .avatar-frame {
            width: 90px;
            height: 90px;
            border: 3px solid #ff007f;
            background: #0d0814;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        #side-right .avatar-frame {
            border-color: #00ffff;
        }

        .avatar-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .avatar-placeholder {
            font-size: 36px;
            color: #3d2466;
            animation: blink 1s infinite;
        }

        .player-info {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .player-name {
            font-size: 15px;
            color: #ffcc00;
            line-height: 1.2;
        }

        /* ADAPTACIÓN MODO 5V5 */
        .view-5v5 .player-card {
            padding: 8px;
            gap: 4px;
        }
        .view-5v5 .player-body { gap: 8px; }
        .view-5v5 .avatar-frame { width: 45px; height: 45px; }
        .view-5v5 .player-name { font-size: 10px; }
        .view-5v5 .xp-text { font-size: 8px; }

        /* ADAPTACIÓN MODO INDIVIDUAL */
        .view-individual #side-right, 
        .view-individual #center-axis {
            display: none !important;
        }
        .view-individual #side-left {
            max-width: 500px;
            margin: 0 auto;
        }

        .hidden { display: none !important; }

        /* ANIMACIONES */
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
        @keyframes blink {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }
    </style>
</head>
<body>

    <header class="admin-panel">
        <div class="control-group">
            <label for="mode-select">MODO:</label>
            <select id="mode-select">
                <option value="1v1">DUELO ALEATORIO (1 VS 1)</option>
                <option value="1v1-same-level">DUELO (MISMO NIVEL)</option>
                <option value="individual">INDIVIDUAL</option>
                <option value="5v5">ESCUADRÓN (5 VS 5)</option>
            </select>
        </div>
        
        <div class="control-group">
            <label for="cat-select">CATEGORÍA:</label>
            <select id="cat-select">
                <option value="1-3">RANGO BAJO (Nv 1 a 3)</option>
                <option value="4-6">RANGO ALTO (Nv 4 a 6)</option>
            </select>
        </div>

        <!-- SELECTOR DINÁMICO DE NIVEL EXACTO (SOLO PARA MODO MISMO NIVEL) -->
        <div class="control-group hidden" id="exact-level-container">
            <label for="level-select">NIVEL:</label>
            <select id="level-select">
                <!-- Se llena dinámicamente según la categoría activa -->
            </select>
        </div>

        <div class="arena-stats">
            <span>DISPONIBLES: <span id="count-available">0</span></span>
            <span>| JUGARON: <span id="count-played">0</span></span>
        </div>
        <button id="btn-shuffle">¡START SHUFFLE!</button>
    </header>

    <div class="game-logo-container">
        <img src="https://sinergiacreativave-ctrl.github.io/LEVELUPSRL/logo.png" alt="LEVEL UP!" class="game-logo" onerror="this.style.display='none'">
    </div>

    <main id="battle-arena" class="view-1v1">
        <section id="side-left" class="arena-side"></section>
        <section id="center-axis">
            <div class="axis-line"></div>
            <div class="vs-box"><span class="vs-text">VS</span></div>
            <div class="axis-line"></div>
        </section>
        <section id="side-right" class="arena-side"></section>
    </main>

    <!-- Librería XLSX para leer los datos -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script>
        const EXCEL_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vT039Y2nAQCxDsSaD4bp_7Up1GkLGWmJ9bQdYRH5qZvLw1Uf-eZFoV07kNN5ztpssrX0YoQaQRs-YqS/pub?output=csv";
        
        let poolJugadores = [];
        let jugadoresJugados = new Set();
        let modoActual = "1v1";
        let shuffleInterval;

        const modeSelect = document.getElementById('mode-select');
        const catSelect = document.getElementById('cat-select');
        const levelSelect = document.getElementById('level-select');
        const exactLevelContainer = document.getElementById('exact-level-container');
        const battleArena = document.getElementById('battle-arena');
        const sideLeft = document.getElementById('side-left');
        const sideRight = document.getElementById('side-right');
        const btnShuffle = document.getElementById('btn-shuffle');

        modeSelect.addEventListener('change', (e) => {
            modoActual = e.target.value;
            if (modoActual === '1v1-same-level') {
                battleArena.className = `view-1v1`;
                exactLevelContainer.classList.remove('hidden');
                actualizarOpcionesDeNivel();
            } else {
                battleArena.className = `view-${modoActual}`;
                exactLevelContainer.classList.add('hidden');
            }
            actualizarContadores();
            limpiarArena();
        });

        catSelect.addEventListener('change', () => {
            if (modoActual === '1v1-same-level') {
                actualizarOpcionesDeNivel();
            }
            actualizarContadores();
            limpiarArena();
        });

        levelSelect.addEventListener('change', () => {
            actualizarContadores();
            limpiarArena();
        });

        function actualizarOpcionesDeNivel() {
            levelSelect.innerHTML = "";
            const rango = catSelect.value;
            const niveles = rango === "1-3" ? [1, 2, 3] : [4, 5, 6];
            
            niveles.forEach(lvl => {
                const opt = document.createElement('option');
                opt.value = lvl;
                opt.textContent = `Nivel ${lvl}`;
                levelSelect.appendChild(opt);
            });
        }

        async function cargarDatos() {
            try {
                const response = await fetch(EXCEL_URL);
                const buffer = await response.arrayBuffer();
                const workbook = XLSX.read(buffer, { type: 'array' });
                const firstSheetName = workbook.SheetNames[0];
                const worksheet = workbook.Sheets[firstSheetName];
                const jsonData = XLSX.utils.sheet_to_json(worksheet);
                
                poolJugadores = jsonData.map(row => ({
                    id: String(row["ID"] || "").trim(),
                    nombre: String(row["Gamer Tag"] || "").trim(),
                    avatar: row["Avatar URL"] || "",
                    xp: parseInt(row["XP (Puntaje Total)"]) || 0,
                    nivel: parseInt(row["Nivel"]) || 1
                })).filter(j => j.id !== "" && j.nombre !== ""); 
                
                actualizarContadores();
                limpiarArena();
            } catch (error) {
                console.error("Error cargando el servidor arcade:", error);
            }
        }

        function obtenerPoolFiltrado() {
            if (modoActual === '1v1-same-level') {
                const nivelExacto = parseInt(levelSelect.value) || 1;
                return poolJugadores.filter(j => j.nivel === nivelExacto);
            } else {
                const rango = catSelect.value;
                const minNivel = rango === "1-3" ? 1 : 4;
                const maxNivel = rango === "1-3" ? 3 : 6;
                return poolJugadores.filter(j => j.nivel >= minNivel && j.nivel <= maxNivel);
            }
        }

        function actualizarContadores() {
            const poolFiltrado = obtenerPoolFiltrado();
            const disponibles = poolFiltrado.filter(j => !jugadoresJugados.has(j.id)).length;
            const jugaron = poolFiltrado.filter(j => jugadoresJugados.has(j.id)).length;

            document.getElementById('count-available').textContent = disponibles;
            document.getElementById('count-played').textContent = jugaron;
            
            if (disponibles === 0 && poolFiltrado.length > 0) {
                alert(`🎮 ¡Ronda completada! Reiniciando la cola de este grupo para que todos vuelvan a participar.`);
                poolFiltrado.forEach(j => jugadoresJugados.delete(j.id));
                actualizarContadores();
            }
        }

        function limpiarArena() {
            sideLeft.innerHTML = "";
            sideRight.innerHTML = "";
            
            const numSlots = modoActual === '5v5' ? 5 : 1;
            for(let i=0; i<numSlots; i++) {
                sideLeft.appendChild(crearSlotVacio(modoActual === '5v5' ? `P${i+1}` : 'PLAYER 1'));
                if(modoActual !== 'individual') {
                    sideRight.appendChild(crearSlotVacio(modoActual === '5v5' ? `P${i+6}` : 'PLAYER 2'));
                }
            }
        }

        function crearSlotVacio(label) {
            const card = document.createElement('div');
            card.className = 'player-card';
            card.innerHTML = `
                <div class="player-header">
                    <span>${label}</span>
                </div>
                <div class="player-body">
                    <div class="avatar-frame"><span class="avatar-placeholder">?</span></div>
                    <div class="player-info">
                        <div class="player-name">¿Quién será?</div>
                    </div>
                </div>
            `;
            return card;
        }

        function renderJugador(jugador, label) {
            const card = document.createElement('div');
            card.className = 'player-card';

            card.innerHTML = `
                <div class="player-header">
                    <span>ID: ${jugador.id}</span>
                    <span>Nv.${jugador.nivel}</span>
                </div>
                <div class="player-body">
                    <div class="avatar-frame">
                        ${jugador.avatar ? `<img src="${jugador.avatar}" alt="${jugador.nombre}">` : `<span class="avatar-placeholder">?</span>`}
                    </div>
                    <div class="player-info">
                        <div class="player-name">${jugador.nombre}</div>
                        <div class="xp-text">XP: ${jugador.xp}</div>
                    </div>
                </div>
            `;
            return card;
        }

        btnShuffle.addEventListener('click', () => {
            const poolFiltrado = obtenerPoolFiltrado();
            if (poolFiltrado.length === 0) {
                alert("No hay alumnos cargados para este nivel o categoría.");
                return;
            }

            let disponibles = poolFiltrado.filter(j => !jugadoresJugados.has(j.id));
            let reqPlayers = (modoActual === 'individual') ? 1 : ((modoActual === '5v5') ? 10 : 2);
            
            if (poolFiltrado.length < reqPlayers) {
                alert(`No hay suficientes alumnos registrados (mínimo ${reqPlayers}) para este modo.`);
                return;
            }

            // Si quedan pocos disponibles, reiniciamos la cola del grupo para asegurar participación sin trancarse
            if (disponibles.length < reqPlayers) {
                alert("¡Completando la ronda! Reiniciando cola para emparejar a los alumnos restantes.");
                poolFiltrado.forEach(j => jugadoresJugados.delete(j.id));
                disponibles = [...poolFiltrado];
            }

            let ticks = 0;
            clearInterval(shuffleInterval);
            shuffleInterval = setInterval(() => {
                const tempDispo = [...disponibles].sort(() => 0.5 - Math.random());
                mostrarSeleccionados(tempDispo.slice(0, reqPlayers));
                ticks++;
                
                if (ticks > 15) {
                    clearInterval(shuffleInterval);
                    const finalSelection = [];
                    for(let i=0; i<reqPlayers; i++) {
                        const elegido = disponibles.splice(Math.floor(Math.random() * disponibles.length), 1)[0];
                        finalSelection.push(elegido);
                        jugadoresJugados.add(elegido.id); 
                    }
                    mostrarSeleccionados(finalSelection);
                    actualizarContadores();
                }
            }, 100);
        });

        function mostrarSeleccionados(lista) {
            sideLeft.innerHTML = "";
            sideRight.innerHTML = "";
            
            if (modoActual === 'individual') {
                sideLeft.appendChild(renderJugador(lista[0], "HÉROE"));
            } else if (modoActual === '1v1' || modoActual === '1v1-same-level') {
                sideLeft.appendChild(renderJugador(lista[0], "PLAYER 1"));
                sideRight.appendChild(renderJugador(lista[1], "PLAYER 2"));
            } else if (modoActual === '5v5') {
                for(let i=0; i<5; i++) {
                    sideLeft.appendChild(renderJugador(lista[i], `SQUAD A - P${i+1}`));
                    sideRight.appendChild(renderJugador(lista[i+5], `SQUAD B - P${i+1}`));
                }
            }
        }

        cargarDatos();
    </script>
</body>
</html>
